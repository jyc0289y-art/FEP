<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP.01 교훈집 — 일상속 경험의 심리학</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eaeaea;
    --muted: #8888aa;
    --green: #4ecca3;
    --yellow: #f5c542;
    --red: #e94560;
    --blue: #5bc0eb;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-bottom: 3px solid var(--accent);
  }
  .hero h1 { font-size: 2.2rem; margin-bottom: 8px; }
  .hero .sub { color: var(--muted); font-size: 1rem; }
  .hero .stats {
    display: flex; justify-content: center; gap: 30px;
    margin-top: 24px; flex-wrap: wrap;
  }
  .stat-box {
    background: rgba(255,255,255,0.05);
    border-radius: 12px; padding: 16px 24px;
    text-align: center; min-width: 120px;
  }
  .stat-box .num { font-size: 2rem; font-weight: 800; color: var(--accent); }
  .stat-box .label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  /* Filters */
  .filters {
    display: flex; justify-content: center; gap: 10px;
    padding: 24px 20px; flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card); border: 1px solid #333;
    color: var(--text); padding: 8px 16px; border-radius: 20px;
    cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Severity legend */
  .legend {
    display: flex; justify-content: center; gap: 20px;
    padding: 0 20px 20px; font-size: 0.8rem;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.red { background: var(--red); }
  .dot.yellow { background: var(--yellow); }
  .dot.green { background: var(--green); }

  /* Cards grid */
  .grid {
    max-width: 1200px; margin: 0 auto;
    padding: 0 20px 60px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    border-left: 4px solid var(--accent2);
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(233,69,96,0.15); }
  .card.severity-critical { border-left-color: var(--red); }
  .card.severity-medium { border-left-color: var(--yellow); }
  .card.severity-low { border-left-color: var(--green); }

  .card .cat-tag {
    display: inline-block; font-size: 0.7rem;
    background: rgba(255,255,255,0.08); padding: 3px 10px;
    border-radius: 10px; color: var(--muted); margin-bottom: 10px;
  }
  .card h3 { font-size: 1.05rem; margin-bottom: 8px; }
  .card .severity-badge {
    position: absolute; top: 16px; right: 16px;
    font-size: 0.7rem; padding: 2px 8px; border-radius: 8px;
  }
  .severity-badge.critical { background: rgba(233,69,96,0.2); color: var(--red); }
  .severity-badge.medium { background: rgba(245,197,66,0.2); color: var(--yellow); }
  .severity-badge.low { background: rgba(78,204,163,0.2); color: var(--green); }

  .card .symptom { color: var(--muted); font-size: 0.85rem; margin-bottom: 12px; }

  .card .detail {
    max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
  }
  .card.expanded .detail { max-height: 600px; }

  .detail-section { margin-top: 12px; }
  .detail-section .label { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .detail-section p { font-size: 0.85rem; color: #ccc; }

  .expand-hint {
    text-align: center; color: var(--muted); font-size: 0.75rem;
    margin-top: 12px; transition: opacity 0.3s;
  }
  .card.expanded .expand-hint { opacity: 0; }

  /* Evolution timeline */
  .timeline-section {
    max-width: 900px; margin: 0 auto 60px;
    padding: 0 20px;
  }
  .timeline-section h2 {
    text-align: center; font-size: 1.5rem; margin-bottom: 30px;
    color: var(--blue);
  }
  .timeline {
    position: relative;
    padding-left: 40px;
  }
  .timeline::before {
    content: ''; position: absolute; left: 15px; top: 0; bottom: 0;
    width: 3px; background: linear-gradient(to bottom, var(--red), var(--yellow), var(--green));
    border-radius: 3px;
  }
  .tl-item {
    position: relative; margin-bottom: 24px;
    padding: 16px 20px;
    background: var(--card); border-radius: 12px;
    transition: all 0.3s;
  }
  .tl-item:hover { transform: translateX(6px); }
  .tl-item::before {
    content: ''; position: absolute; left: -32px; top: 20px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 3px solid var(--bg);
  }
  .tl-item.success::before { background: var(--green); }
  .tl-item .version { font-size: 0.75rem; color: var(--accent); font-weight: 700; }
  .tl-item h4 { font-size: 0.95rem; margin: 4px 0; }
  .tl-item .params { font-size: 0.8rem; color: var(--muted); font-family: monospace; }
  .tl-item .feedback { font-size: 0.85rem; color: #bbb; margin-top: 6px; font-style: italic; }
  .tl-item .lesson { font-size: 0.8rem; color: var(--green); margin-top: 4px; }

  /* Quiz mode */
  .quiz-section {
    max-width: 700px; margin: 0 auto 60px;
    padding: 0 20px;
    text-align: center;
  }
  .quiz-section h2 { font-size: 1.5rem; margin-bottom: 20px; color: var(--yellow); }
  .quiz-card {
    background: var(--card); border-radius: 16px;
    padding: 30px; text-align: left;
  }
  .quiz-card .q { font-size: 1.1rem; margin-bottom: 16px; }
  .quiz-card .q .emoji { font-size: 1.4rem; margin-right: 8px; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt {
    background: rgba(255,255,255,0.05); border: 1px solid #333;
    padding: 12px 16px; border-radius: 10px; cursor: pointer;
    transition: all 0.2s; font-size: 0.9rem;
  }
  .quiz-opt:hover { border-color: var(--blue); background: rgba(91,192,235,0.1); }
  .quiz-opt.correct { border-color: var(--green); background: rgba(78,204,163,0.15); }
  .quiz-opt.wrong { border-color: var(--red); background: rgba(233,69,96,0.1); }
  .quiz-feedback {
    margin-top: 16px; padding: 12px; border-radius: 10px;
    display: none; font-size: 0.9rem;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.right { background: rgba(78,204,163,0.1); color: var(--green); }
  .quiz-feedback.wrong-fb { background: rgba(233,69,96,0.1); color: var(--red); }
  .quiz-nav {
    display: flex; justify-content: space-between; margin-top: 20px;
  }
  .quiz-nav button {
    background: var(--accent2); border: none; color: #fff;
    padding: 10px 24px; border-radius: 10px; cursor: pointer;
    font-size: 0.9rem; transition: background 0.2s;
  }
  .quiz-nav button:hover { background: var(--accent); }
  .quiz-score {
    font-size: 1.2rem; color: var(--green); margin-top: 16px;
    display: none;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .hero h1 { font-size: 1.5rem; }
    .grid { grid-template-columns: 1fr; }
    .stat-box { min-width: 90px; padding: 12px 16px; }
    .stat-box .num { font-size: 1.5rem; }
  }

  /* Section divider */
  .section-divider {
    text-align: center; padding: 40px 20px 20px;
    max-width: 900px; margin: 0 auto;
  }
  .section-divider h2 { font-size: 1.5rem; color: var(--blue); }
  .section-divider p { color: var(--muted); font-size: 0.9rem; margin-top: 8px; }

  /* Tab navigation */
  .tabs {
    display: flex; justify-content: center; gap: 0;
    margin: 20px auto; max-width: 600px;
    background: var(--card); border-radius: 12px;
    overflow: hidden;
  }
  .tab {
    flex: 1; padding: 12px; text-align: center;
    cursor: pointer; font-size: 0.9rem;
    transition: all 0.2s; border: none; background: transparent;
    color: var(--muted);
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .tab.active { color: #fff; background: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>

<div class="hero">
  <h1>EP.01 "강요된 칭찬의 심리학" 교훈집</h1>

</div>

// ===== RENDER =====
const categories = [...new Set(lessons.map(l => l.cat))];

function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '<button class="filter-btn active" data-cat="all" onclick="filterCards(\'all\', this)">전체</button>';
  categories.forEach(cat => {
    const count = lessons.filter(l => l.cat === cat).length;
    el.innerHTML += `<button class="filter-btn" data-cat="${cat}" onclick="filterCards('${cat}', this)">${cat} (${count})</button>`;
  });
}

function renderCards(filter = 'all') {
  const grid = document.getElementById('grid');
  const filtered = filter === 'all' ? lessons : lessons.filter(l => l.cat === filter);
  grid.innerHTML = filtered.map(l => `
    <div class="card severity-${l.severity}" onclick="this.classList.toggle('expanded')">
      <span class="severity-badge ${l.severity}">${{critical:'치명적',medium:'중간',low:'낮음'}[l.severity]}</span>
      <span class="cat-tag">${l.cat}</span>
      <h3>${l.id} ${l.title}</h3>
      <p class="symptom">${l.symptom}</p>
      <div class="detail">
        <div class="detail-section"><div class="label">원인</div><p>${l.cause}</p></div>
        <div class="detail-section"><div class="label">해결</div><p>${l.solution}</p></div>
        <div class="detail-section"><div class="label">규칙</div><p style="color:var(--accent)">${l.rule}</p></div>
      </div>
      <div class="expand-hint">탭하여 상세 보기</div>
    </div>
  `).join('');
}

function filterCards(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(cat);
}

function renderTimeline() {
  const el = document.getElementById('timeline');
  el.innerHTML = breathingEvolution.map(b => `
    <div class="tl-item ${b.success ? 'success' : ''}">
      <span class="version">${b.ver}</span>
      <h4>${b.name}</h4>
      <div class="params">${b.params}</div>
      <div class="feedback">"${b.feedback}"</div>
      <div class="lesson">${b.lesson}</div>
    </div>
  `).join('');
}

// ===== QUIZ =====
let quizIdx = 0;
let score = 0;
let answered = false;

function renderQuiz() {
  const card = document.getElementById('quiz-card');
  const q = quizzes[quizIdx];
  answered = false;
  card.innerHTML = `
    <p class="q"><span class="emoji">Q${quizIdx+1}/${quizzes.length}</span> ${q.q}</p>
    <div class="quiz-options">
      ${q.opts.map((o, i) => `<div class="quiz-opt" onclick="checkAnswer(${i})">${o}</div>`).join('')}
    </div>
    <div class="quiz-feedback" id="qfb"></div>
    <div class="quiz-nav">
      <button onclick="prevQuiz()" ${quizIdx===0?'disabled style="opacity:0.3"':''}>이전</button>
      <span style="color:var(--muted);font-size:0.85rem">${quizIdx+1} / ${quizzes.length}</span>
      <button onclick="nextQuiz()">${quizIdx===quizzes.length-1?'결과 보기':'다음'}</button>
    </div>
  `;
}

function checkAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = quizzes[quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((o, i) => {
    if (i === q.answer) o.classList.add('correct');
    else if (i === idx) o.classList.add('wrong');
  });
  const fb = document.getElementById('qfb');
  if (idx === q.answer) {
    score++;
    fb.className = 'quiz-feedback show right';
    fb.textContent = '정답! ' + q.explain;
  } else {
    fb.className = 'quiz-feedback show wrong-fb';
    fb.textContent = '오답. ' + q.explain;
  }
}

function nextQuiz() {
  if (quizIdx < quizzes.length - 1) { quizIdx++; renderQuiz(); }
  else {
    document.getElementById('quiz-card').innerHTML = `
      <div style="text-align:center;padding:40px">
        <div style="font-size:3rem;margin-bottom:16px">${score >= 6 ? '🏆' : score >= 4 ? '👍' : '📖'}</div>
        <h3>${score} / ${quizzes.length} 정답</h3>
        <p style="color:var(--muted);margin-top:8px">${score >= 6 ? '교훈이 체화되었습니다!' : score >= 4 ? '거의 다 왔어요. 틀린 부분만 복습!' : '카드 뷰를 다시 확인하고 도전해보세요.'}</p>
        <button onclick="quizIdx=0;score=0;renderQuiz()" style="margin-top:20px;background:var(--accent);border:none;color:#fff;padding:10px 24px;border-radius:10px;cursor:pointer">다시 도전</button>
      </div>
    `;
  }
}

function prevQuiz() {
  if (quizIdx > 0) { quizIdx--; renderQuiz(); }
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab-content#tab-${tab}`).classList.add('active');
  event.target.classList.add('active');
}

// ===== INIT =====
renderFilters();
renderCards();
renderTimeline();
renderQuiz();
</script>
