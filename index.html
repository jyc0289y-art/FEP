  .header { text-align:center; padding:28px 0 20px; border-bottom:1px solid var(--border); margin-bottom:20px; }

  .stat-card .label { font-size:11px; color:var(--text-dim); margin-top:2px; }

  .section-title { font-size:16px; font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:6px; }

  .progress-label { display:flex; justify-content:space-between; font-size:13px; color:var(--text-dim); margin-bottom:12px; }

  .phase-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .phase-dot.done { background:var(--green); }
  .phase-dot.in_progress { background:var(--yellow); animation:pulse 2s infinite; }
  .phase-dot.pending { background:var(--border); }

  .phase-id { color:var(--text-dim); font-family:monospace; font-size:11px; min-width:88px; }
  .phase-status { margin-left:auto; font-size:11px; padding:2px 7px; border-radius:10px; font-weight:500; }
  .phase-status.done { background:var(--green-dim); color:var(--green); }
  .phase-status.in_progress { background:var(--yellow-dim); color:var(--yellow); }
  .phase-status.pending { color:var(--text-dim); }

  .card-list { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:14px; }
  .card-item { display:flex; align-items:center; gap:8px; padding:5px 0; font-size:13px; border-bottom:1px solid var(--border); }

  .card-icon { font-size:15px; flex-shrink:0; }
  .card-date { margin-left:auto; font-size:11px; color:var(--text-dim); font-family:monospace; }
  .card-item.pending .card-text { color:var(--text-dim); }
  .card-val { margin-left:auto; font-size:13px; font-weight:600; color:var(--accent); }

  .wl-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

  .doc-layout { display:grid; grid-template-columns:260px 1fr; gap:16px; align-items:start; }
  @media (max-width:800px) { .doc-layout { grid-template-columns:1fr; } }

  .doc-count { font-size:10px; background:var(--border); padding:1px 6px; border-radius:10px; }

  .doc-item-date { font-size:10px; color:var(--text-dim); font-family:monospace; margin-bottom:2px; }
  .doc-item-title { font-size:12px; line-height:1.4; }

  .content-box ul,ol { padding-left:20px; margin-bottom:8px; }
  .content-box li { font-size:13px; margin-bottom:3px; line-height:1.5; }
  .content-box p { font-size:13px; margin:4px 0; }

  .content-box pre { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px; margin:8px 0; overflow-x:auto; }
  .content-box pre code { background:none; padding:0; font-size:12px; }
  .content-box table { width:100%; border-collapse:collapse; font-size:12px; margin:8px 0; }

// ─── 렌더 초기화 ──────────────────────────────────────────────────
(function init() {
  document.getElementById('episode-badge').textContent = `${DATA.project.episode} — ${DATA.project.title}`;

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['overview','docs','worklog'][i]===t));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');

function renderStats() {

    [a.locations,'Locations'],[a.style_a+a.style_b,'Characters'],

    el.innerHTML = `<div class="value">${v}</div><div class="label">${l}</div>`;
    document.getElementById('stats-grid').appendChild(el);

}
function renderPhases() {
  const done = DATA.phases.filter(p=>p[2]==='done').length;
  const total = DATA.phases.length;
  const pct = Math.round(done/total*100);
  document.getElementById('progress-text').textContent = `${done} / ${total} phases complete`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('phase-list').innerHTML = DATA.phases.map(([id,name,st]) =>
    `<li class="phase-item"><span class="phase-dot ${st}"></span><span class="phase-id">${id}</span><span>${name}</span>
    <span class="phase-status ${st}">${st==='done'?'Done':st==='in_progress'?'In Progress':'Pending'}</span></li>`
  ).join('');
}
function renderMilestones() {
  document.getElementById('milestones').innerHTML = DATA.milestones.map(([done,text,date]) =>
    `<div class="card-item ${done?'':'pending'}">
      <span class="card-icon">${done?'✅':'⬜'}</span>
      <span class="card-text">${esc(text)}</span>
      ${date?`<span class="card-date">${date}</span>`:''}
    </div>`
  ).join('');
}
function renderAssets() {
  const a = DATA.assets;
  [
    ['🏞️','BG Locations',a.locations],['😊','Chars Style A',a.style_a],
    ['🎬','Chars Style B',a.style_b],['✂️','Alphas',a.alphas],

// ─── Documents ────────────────────────────────────────────────────
function renderDocSidebar() {
  const groups = {};
  DOCS.forEach((doc, i) => {
    if (!groups[doc.g]) groups[doc.g] = [];
    groups[doc.g].push({ ...doc, _i: i });
  });
  // Deduplicate by title within group
  const seen = new Set();
  let html = '';
  Object.entries(groups).forEach(([gname, docs]) => {
    const uniqueDocs = docs.filter(d => {
      const key = d.g + '|' + d.title;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    html += `<div class="doc-group-header">${esc(gname)}<span class="doc-count">${uniqueDocs.length}</span></div>`;
    uniqueDocs.forEach(doc => {
      html += `<div class="doc-item" data-idx="${doc._i}">
        <div class="doc-item-date">${doc.ts}</div>
        <div class="doc-item-title">${esc(doc.title)}</div>
      </div>`;
    });
  });
  const sidebar = document.getElementById('doc-sidebar');
  sidebar.innerHTML = html;
  sidebar.querySelectorAll('.doc-item').forEach(el => {
    el.addEventListener('click', () => openDoc(parseInt(el.dataset.idx)));
  });
}

function openDoc(idx) {
  const doc = DOCS[idx];
  if (!doc) return;

  // Active state
  document.querySelectorAll('.doc-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });

  // Fetch and render
  const contentEl = document.getElementById('doc-content');
  contentEl.innerHTML = '<div class="loading">불러오는 중…</div>';
  fetch('./' + doc.path + '?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => { contentEl.innerHTML = renderMD(md); })
    .catch(err => {
      contentEl.innerHTML = `<div class="error-msg">
        문서를 불러올 수 없습니다 (${err.message})<br>
        <code style="font-size:11px">${esc(doc.path)}</code>
      </div>`;
    });

  // Related
  const relBox = document.getElementById('related-box');
  if (doc.rel && doc.rel.length > 0) {
    relBox.style.display = 'block';
    document.getElementById('related-list').innerHTML = doc.rel.map(r => {
      const target = DOCS[r.i];
      return `<div class="related-item" data-idx="${r.i}">
        <div class="related-file">${esc(target ? target.path.split('/').pop() : '')}</div>
        <div class="related-desc">${esc(r.d)}</div>
      </div>`;
    }).join('');
    document.querySelectorAll('.related-item').forEach(el => {
      el.addEventListener('click', () => openDoc(parseInt(el.dataset.idx)));
    });
  } else {
    relBox.style.display = 'none';
  }
}

// ─── Worklog ──────────────────────────────────────────────────────
function renderWorklogNav() {
  document.getElementById('wl-nav').innerHTML = DATA.worklog_dates.slice().reverse().map(d =>
    `<button class="wl-btn" data-date="${d}">${d}</button>`
  ).join('');
  document.querySelectorAll('.wl-btn').forEach(btn => {
    btn.addEventListener('click', () => loadWorklog(btn.dataset.date));
  });
  if (DATA.worklog_dates.length > 0) {
    loadWorklog(DATA.worklog_dates[DATA.worklog_dates.length - 1]);
  }
}

function loadWorklog(date) {
  document.querySelectorAll('.wl-btn').forEach(b => b.classList.toggle('active', b.dataset.date===date));
  const el = document.getElementById('wl-content');
  el.innerHTML = '<div class="loading">불러오는 중…</div>';
  fetch(`./worklog/${date}.md?t=${Date.now()}`)
    .then(r => { if (!r.ok) throw new Error(); return r.text(); })
    .then(md => { el.innerHTML = renderMD(md); })
    .catch(() => { el.innerHTML = `<div class="error-msg">작업일지 없음: ${date}</div>`; });
}

// ─── Markdown 렌더러 ──────────────────────────────────────────────
function renderMD(md) {
  // Strip HTML comments
  md = md.replace(/<!--[\s\S]*?-->/g, '').trim();
  let html = '', lines = md.split('\n'), inUl = false, inPre = false, preBuf = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    // Code blocks
    if (line.startsWith('```')) {
      if (!inPre) { inUl && (html += '</ul>', inUl=false); html += '<pre><code>'; inPre=true; }
      else { html += esc(preBuf) + '</code></pre>'; inPre=false; preBuf=''; }
      continue;
    }
    if (inPre) { preBuf += line + '\n'; continue; }

    const t = line.trim();
    // Table
    if (t.startsWith('|')) {
      inUl && (html += '</ul>', inUl=false);
      if (t.match(/^\|[\s|:-]+\|$/)) continue; // separator
      const cells = t.slice(1,-1).split('|');
      html += '<tr>' + cells.map(c=>`<td>${inline(c.trim())}</td>`).join('') + '</tr>';
      continue;
    }
    if (line.startsWith('# ')) { inUl&&(html+='</ul>',inUl=false); html+=`<h1>${inline(line.slice(2))}</h1>`; }
    else if (line.startsWith('## ')) { inUl&&(html+='</ul>',inUl=false); html+=`<h2>${inline(line.slice(3))}</h2>`; }
    else if (line.startsWith('### ')) { inUl&&(html+='</ul>',inUl=false); html+=`<h3>${inline(line.slice(4))}</h3>`; }
    else if (line.startsWith('#### ')) { inUl&&(html+='</ul>',inUl=false); html+=`<h3 style="font-size:12px">${inline(line.slice(5))}</h3>`; }
    else if (line.startsWith('> ')) { inUl&&(html+='</ul>',inUl=false); html+=`<blockquote>${inline(line.slice(2))}</blockquote>`; }
    else if (t.startsWith('---') && t.replace(/-/g,'')==='' ) { inUl&&(html+='</ul>',inUl=false); html+='<hr>'; }
    else if (line.match(/^[-*] /)) { if(!inUl){html+='<ul>';inUl=true;} html+=`<li>${inline(line.slice(2))}</li>`; }
    else if (line.match(/^\d+\. /)) { inUl&&(html+='</ul>',inUl=false); html+=`<p>${inline(line)}</p>`; }
    else if (t==='') { inUl&&(html+='</ul>',inUl=false); }
    else { inUl&&(html+='</ul>',inUl=false); html+=`<p>${inline(line)}</p>`; }
  }
  if (inUl) html += '</ul>';
  // Wrap table rows
  html = html.replace(/(<tr>.*?<\/tr>)+/gs, m => `<table>${m}</table>`);
  return html;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inline(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
  return s;
}
