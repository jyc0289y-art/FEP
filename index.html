<style>

    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-hover: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f3a5f;
    --green: #3fb950;
    --green-dim: #1a3a2a;
    --yellow: #d29922;
    --yellow-dim: #3d2e00;
    --red: #f85149;
    --purple: #bc8cff;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f8fa;
      --bg-card: #ffffff;
      --bg-hover: #f3f4f6;
      --border: #d0d7de;
      --text: #1f2328;
      --text-dim: #656d76;
      --accent: #0969da;
      --accent-dim: #ddf4ff;
      --green: #1a7f37;
      --green-dim: #dafbe1;
      --yellow: #9a6700;
      --yellow-dim: #fff8c5;
      --red: #cf222e;
      --purple: #8250df;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  /* Tabs */
  .tab-nav { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
  .tab-btn { padding: 10px 20px; background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Header */
  .header { text-align: center; padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .header .subtitle { color: var(--text-dim); font-size: 15px; }
  .header .episode-badge { display: inline-block; margin-top: 12px; padding: 4px 14px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); font-size: 13px; font-weight: 600; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* Section */
  .section { margin-bottom: 24px; }
  .section-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title .icon { font-size: 20px; }

  /* Progress */
  .progress-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .progress-overall { margin-bottom: 16px; }
  .progress-bar-bg { width: 100%; height: 12px; background: var(--border); border-radius: 6px; overflow: hidden; margin-top: 6px; }
  .progress-bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; }
  .progress-bar-fill.green { background: var(--green); }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-dim); }
  .phase-list { list-style: none; }
  .phase-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .phase-item:last-child { border-bottom: none; }
  .phase-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .phase-dot.done { background: var(--green); }
  .phase-dot.in_progress { background: var(--yellow); animation: pulse 2s infinite; }
  .phase-dot.pending { background: var(--border); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .phase-id { color: var(--text-dim); font-family: monospace; font-size: 12px; min-width: 90px; }
  .phase-status { margin-left: auto; font-size: 12px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .phase-status.done { background: var(--green-dim); color: var(--green); }
  .phase-status.in_progress { background: var(--yellow-dim); color: var(--yellow); }
  .phase-status.pending { color: var(--text-dim); }

  /* Milestones/Assets */
  .milestones-grid { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .milestone-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 14px; }
  .milestone-check { font-size: 16px; flex-shrink: 0; }
  .milestone-date { margin-left: auto; font-size: 12px; color: var(--text-dim); font-family: monospace; }
  .milestone-item.pending .milestone-text { color: var(--text-dim); }

  /* Worklog */
  .worklog-nav { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .worklog-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 13px; font-family: monospace; transition: all 0.2s; }
  .worklog-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
  .worklog-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* Doc viewer */
  .doc-layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
  @media (max-width: 800px) { .doc-layout { grid-template-columns: 1fr; } }

  .doc-sidebar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; align-self: start; }
  .doc-group { border-bottom: 1px solid var(--border); }
  .doc-group:last-child { border-bottom: none; }
  .doc-group-header { padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg-hover); display: flex; align-items: center; justify-content: space-between; }
  .doc-group-header .doc-count { font-size: 11px; background: var(--border); padding: 1px 6px; border-radius: 10px; }
  .doc-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .doc-item:last-child { border-bottom: none; }
  .doc-item:hover { background: var(--bg-hover); }
  .doc-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); }
  .doc-item-date { font-size: 11px; color: var(--text-dim); font-family: monospace; margin-bottom: 2px; }
  .doc-item-title { font-size: 13px; line-height: 1.4; }

  .doc-main { min-height: 400px; }
  .doc-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 12px; }
  .doc-content h1 { font-size: 20px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .doc-content h2 { font-size: 16px; color: var(--text-dim); margin: 16px 0 8px; }
  .doc-content h3 { font-size: 14px; color: var(--accent); margin: 12px 0 6px; }
  .doc-content ul { padding-left: 20px; margin-bottom: 8px; }
  .doc-content li { font-size: 14px; margin-bottom: 4px; line-height: 1.5; }
  .doc-content p { font-size: 14px; margin: 4px 0; }
  .doc-content code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', Monaco, monospace; }
  .doc-content table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
  .doc-content th, .doc-content td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
  .doc-content th { background: var(--bg-hover); font-weight: 600; }
  .doc-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-dim); font-size: 13px; margin: 8px 0; }

  .related-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .related-title { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .related-item { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; cursor: pointer; transition: all 0.15s; }
  .related-item:hover { border-color: var(--accent); background: var(--accent-dim); }
  .related-item-file { font-size: 11px; font-family: monospace; color: var(--text-dim); margin-bottom: 2px; }
  .related-item-desc { font-size: 12px; color: var(--text); }

  /* Worklog + Doc content shared */
  .content-area { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; min-height: 200px; }
  .content-area h1 { font-size: 20px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .content-area h2 { font-size: 16px; color: var(--text-dim); margin: 16px 0 8px; }
  .content-area h3 { font-size: 14px; color: var(--accent); margin: 12px 0 6px; }
  .content-area ul { padding-left: 20px; margin-bottom: 8px; }
  .content-area li { font-size: 14px; margin-bottom: 4px; line-height: 1.5; }
  .content-area code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', Monaco, monospace; }
  .content-area table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; overflow-x: auto; display: block; }
  .content-area th, .content-area td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
  .content-area th { background: var(--bg-hover); font-weight: 600; }
  .content-area blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-dim); font-size: 13px; margin: 8px 0; }

  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
  .error-msg { text-align: center; padding: 20px; color: var(--red); font-size: 13px; }
  .doc-empty { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 14px; }

  /* Two-col */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

  /* Footer */
  .footer { text-align: center; padding: 24px 0; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border); margin-top: 24px; }
</style>
</head>

let currentDoc = null;

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['overview','docs','worklog'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

function render(d) {
  document.getElementById('episode-badge').textContent =
    `${d.project.current_episode} — ${d.project.episode_title}`;
  document.getElementById('last-updated').textContent =
    new Date(d.last_updated).toLocaleString('ko-KR');

  // Stats
  const stats = [
    { value: d.assets.locations, label: 'Locations' },
    { value: d.assets.characters_style_a + d.assets.characters_style_b, label: 'Characters' },
    { value: (d.assets.composites_portrait||0)+(d.assets.composites_scene||0), label: 'Composites' },
    { value: d.assets.lp_animations, label: 'LP Anim' },
    { value: (d.assets.bubbles||0)+(d.assets.angel_devil||0)+(d.assets.kongi_poses||0), label: 'FX Assets' },
    { value: d.assets.alphas, label: 'Alphas' },
  ];
  document.getElementById('stats-grid').innerHTML = stats.map(s =>
    `<div class="stat-card"><div class="value">${s.value??0}</div><div class="label">${s.label}</div></div>`
  ).join('');

  // Phases
  const phases = Object.entries(d.phases);
  const done = phases.filter(([,v]) => v.status==='done').length;
  const total = phases.length;
  const pct = Math.round(done/total*100);
  document.getElementById('progress-text').textContent = `${done} / ${total} phases complete`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('phase-list').innerHTML = phases.map(([id, p]) => {
    const label = p.status==='done'?'Done':p.status==='in_progress'?'In Progress':'Pending';
    return `<li class="phase-item">
      <span class="phase-dot ${p.status}"></span>
      <span class="phase-id">${id}</span>
      <span>${p.name}</span>
      <span class="phase-status ${p.status}">${label}</span>
    </li>`;
  }).join('');

  // Milestones
  document.getElementById('milestones').innerHTML = d.milestones.map(m =>
    `<div class="milestone-item ${m.done?'':'pending'}">
      <span class="milestone-check">${m.done?'✅':'⬜'}</span>
      <span class="milestone-text">${esc(m.text)}</span>
      ${m.date?`<span class="milestone-date">${m.date}</span>`:''}
    </div>`
  ).join('');

  // Assets
  document.getElementById('assets-panel').innerHTML = [
    ['🏞️','Background Locations', d.assets.locations],
    ['😊','Chars Style A (SD)', d.assets.characters_style_a],
    ['🎬','Chars Style B (Cinematic)', d.assets.characters_style_b],
    ['✂️','Alpha Extractions', d.assets.alphas],
    ['📐','Composites (Portrait)', d.assets.composites_portrait],
    ['📐','Composites (Scene)', d.assets.composites_scene],
    ['🎭','LivePortrait Animations', d.assets.lp_animations],
    ['💬','Speech/Thought Bubbles', d.assets.bubbles],
    ['😇','Angel/Devil Assets', d.assets.angel_devil],
    ['🐾','Kongi Poses', d.assets.kongi_poses],
  ].map(([icon,label,val]) =>
    `<div class="milestone-item">
      <span class="milestone-check">${icon}</span>
      <span class="milestone-text">${label}</span>
      <span class="milestone-date" style="font-weight:600;color:var(--accent)">${val??0}</span>
    </div>`
  ).join('');

  // Worklog nav
  document.getElementById('worklog-nav').innerHTML = d.dates.slice().reverse().map(date =>
    `<button class="worklog-btn" data-date="${date}" onclick="loadWorklog('${date}')">${date}</button>`
  ).join('');
  if (d.dates.length > 0) loadWorklog(d.dates[d.dates.length-1]);

  // Doc sidebar
  renderDocSidebar();
}

function renderDocSidebar() {
  const totalDocs = DOC_GROUPS.reduce((s,g) => s+g.docs.length, 0);
  let html = '';
  DOC_GROUPS.forEach(group => {
    html += `<div class="doc-group">
      <div class="doc-group-header">
        ${group.label}
        <span class="doc-count">${group.docs.length}</span>
      </div>`;
    group.docs.forEach(doc => {
      const active = currentDoc && currentDoc.file === doc.file ? 'active' : '';
      html += `<div class="doc-item ${active}" onclick="openDoc(${JSON.stringify(JSON.stringify(doc))})">
        <div class="doc-item-date">${doc.ts}</div>
        <div class="doc-item-title">${esc(doc.title)}</div>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('doc-sidebar').innerHTML = html;
}

function openDoc(docJson) {
  const doc = JSON.parse(docJson);
  currentDoc = doc;

  // Update sidebar active state
  document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');

  // Load content
  const contentEl = document.getElementById('doc-content');
  contentEl.innerHTML = '<div class="loading">불러오는 중...</div>';

  fetch(doc.path + '?' + Date.now())
    .then(r => { if (!r.ok) throw new Error(); return r.text(); })
    .then(md => { contentEl.innerHTML = renderMarkdown(md); })
    .catch(() => {
      contentEl.innerHTML = `<div class="error-msg">문서를 불러올 수 없습니다:<br><code>${esc(doc.file)}</code></div>`;
    });

  // Related panel
  const relPanel = document.getElementById('related-panel');
  const relList = document.getElementById('related-list');
  if (doc.related && doc.related.length > 0) {
    relPanel.style.display = 'block';
    relList.innerHTML = doc.related.map(r => {
      const linkedDoc = findDoc(r.file);
      return `<div class="related-item" onclick="${linkedDoc ? `openDocByFile(${JSON.stringify(JSON.stringify(r.file))})` : ''}">
        <div class="related-item-file">${esc(r.file.split('/').pop())}</div>
        <div class="related-item-desc">${esc(r.desc)}</div>
      </div>`;
    }).join('');
  } else {
    relPanel.style.display = 'none';
  }
}

function findDoc(file) {
  for (const group of DOC_GROUPS) {
    const doc = group.docs.find(d => d.file === file);
    if (doc) return doc;
  }
  return null;
}

function openDocByFile(fileJson) {
  const file = JSON.parse(fileJson);
  const doc = findDoc(file);
  if (!doc) return;
  // Find and click the sidebar item
  document.querySelectorAll('.doc-item').forEach(el => {
    if (el.querySelector('.doc-item-title')?.textContent === doc.title) {
      el.click();
    }
  });
}

async function loadWorklog(date) {
  document.querySelectorAll('.worklog-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === date);
  });
  const el = document.getElementById('worklog-content');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res = await fetch('./worklog/' + date + '.md?' + Date.now());
    if (!res.ok) throw new Error();
    el.innerHTML = renderMarkdown(await res.text());
  } catch {
    el.innerHTML = `<div class="error-msg">작업일지 없음: ${date}</div>`;
  }
}

function renderMarkdown(md) {
  // Strip HTML comments (metadata headers)
  md = md.replace(/<!--[\s\S]*?-->/g, '');
  let html = '';
  const lines = md.split('\n');
  let inList = false, inTable = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    // Table detection
    if (trimmed.startsWith('|')) {
      if (!inList && !inTable) { html += '<table>'; inTable = true; }
      if (trimmed.startsWith('|---') || trimmed.startsWith('| ---') || trimmed.match(/^\|[\s:-]+\|/)) {
        // separator row
      } else {
        const cells = trimmed.slice(1, -1).split('|').map(c => `<td>${inline(c.trim())}</td>`).join('');
        html += `<tr>${cells}</tr>`;
      }
      continue;
    } else if (inTable) { html += '</table>'; inTable = false; }

    if (line.startsWith('# ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h1>${esc(line.slice(2))}</h1>`;
    } else if (line.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h2>${esc(line.slice(3))}</h2>`;
    } else if (line.startsWith('### ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h3>${esc(line.slice(4))}</h3>`;
    } else if (line.startsWith('> ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<blockquote>${inline(line.slice(2))}</blockquote>`;
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inline(line.slice(2))}</li>`;
    } else if (trimmed === '') {
      if (inList) { html += '</ul>'; inList = false; }
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p>${inline(line)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  if (inTable) html += '</table>';
  return html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function inline(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return s;
}
