<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEP Dashboard - 일상속 경험의 심리학</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-hover: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f3a5f;
    --green: #3fb950;
    --green-dim: #1a3a2a;
    --yellow: #d29922;
    --yellow-dim: #3d2e00;
    --red: #f85149;
    --purple: #bc8cff;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f8fa;
      --bg-card: #ffffff;
      --bg-hover: #f3f4f6;
      --border: #d0d7de;
      --text: #1f2328;
      --text-dim: #656d76;
      --accent: #0969da;
      --accent-dim: #ddf4ff;
      --green: #1a7f37;
      --green-dim: #dafbe1;
      --yellow: #9a6700;
      --yellow-dim: #fff8c5;
      --red: #cf222e;
      --purple: #8250df;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  .header {
    text-align: center;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .header .subtitle { color: var(--text-dim); font-size: 15px; }
  .header .episode-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .icon { font-size: 20px; }

  .progress-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .progress-overall { margin-bottom: 16px; }
  .progress-bar-bg {
    width: 100%;
    height: 12px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s ease;
  }
  .progress-bar-fill.green { background: var(--green); }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-dim);
  }

  .phase-list { list-style: none; }
  .phase-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .phase-item:last-child { border-bottom: none; }
  .phase-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .phase-dot.done { background: var(--green); }
  .phase-dot.in_progress { background: var(--yellow); animation: pulse 2s infinite; }
  .phase-dot.pending { background: var(--border); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .phase-id { color: var(--text-dim); font-family: monospace; font-size: 12px; min-width: 90px; }
  .phase-status {
    margin-left: auto;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .phase-status.done { background: var(--green-dim); color: var(--green); }
  .phase-status.in_progress { background: var(--yellow-dim); color: var(--yellow); }
  .phase-status.pending { color: var(--text-dim); }

  .milestones-grid {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .milestone-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 14px;
  }
  .milestone-check { font-size: 16px; flex-shrink: 0; }
  .milestone-date { margin-left: auto; font-size: 12px; color: var(--text-dim); font-family: monospace; }
  .milestone-item.pending .milestone-text { color: var(--text-dim); }

  .worklog-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .worklog-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-family: monospace;
    transition: all 0.2s;
  }
  .worklog-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
  .worklog-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .worklog-content {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    min-height: 200px;
  }
  .worklog-content h1 { font-size: 20px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .worklog-content h2 { font-size: 16px; color: var(--text-dim); margin: 16px 0 8px; cursor: pointer; }
  .worklog-content h3 { font-size: 14px; color: var(--accent); margin: 12px 0 6px; }
  .worklog-content ul { padding-left: 20px; margin-bottom: 8px; }
  .worklog-content li { font-size: 14px; margin-bottom: 4px; line-height: 1.5; }
  .worklog-content code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'SF Mono', Monaco, monospace;
  }

  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
  .error-msg { text-align: center; padding: 20px; color: var(--red); font-size: 13px; }

  .footer {
    text-align: center;
    padding: 24px 0;
    color: var(--text-dim);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 24px;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 700px) {
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>FEP Dashboard</h1>
    <div class="subtitle">일상속 경험의 심리학 - 제작 진행 현황</div>
    <div class="episode-badge" id="episode-badge"></div>
  </div>

  <div class="stats-grid" id="stats-grid"></div>

  <div class="section">
    <div class="section-title"><span class="icon">⚙️</span> Phase 진행률</div>
    <div class="progress-container">
      <div class="progress-overall">
        <div class="progress-label">
          <span id="progress-text"></span>
          <span id="progress-pct"></span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill green" id="progress-bar" style="width: 0%"></div>
        </div>
      </div>
      <ul class="phase-list" id="phase-list"></ul>
    </div>
  </div>

  <div class="two-col">
    <div class="section">
      <div class="section-title"><span class="icon">★</span> Milestones</div>
      <div class="milestones-grid" id="milestones"></div>
    </div>
    <div class="section">
      <div class="section-title"><span class="icon">⚙️</span> Asset Count</div>
      <div class="milestones-grid" id="assets-panel"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="icon">📝</span> Work Log</div>
    <div class="worklog-nav" id="worklog-nav"></div>
    <div class="worklog-content" id="worklog-content">
      <div class="loading">날짜를 선택하세요.</div>
    </div>
  </div>

  <div class="footer">
    FEP (Familiar Experience Psychology) &middot; P21 &middot; Last updated: <span id="last-updated">-</span>
  </div>
</div>

<script>
// ─── 내장 데이터 (네트워크 불필요) ───────────────────────────────
const EMBEDDED_DATA = {
  "dates": ["2026-04-12", "2026-04-13", "2026-04-14", "2026-04-15", "2026-04-16"],
  "last_updated": "2026-04-16T03:00:00",
  "project": {
    "name": "FEP - 일상속 경험의 심리학",
    "current_episode": "EP01",
    "episode_title": "강요된 칭찬의 심리학"
  },
  "phases": {
    "Phase 8a":   { "name": "시네마틱 각본 v2",        "status": "done" },
    "Phase 8a-2": { "name": "연출 원칙 + TTS 전략",    "status": "done" },
    "Phase 8b":   { "name": "각본 사용자 검수",         "status": "done" },
    "Phase 8c":   { "name": "쇼츠 각본 + BGM 설계",    "status": "done" },
    "Phase 8c-2": { "name": "Typecast 보이스 캐스팅",   "status": "done" },
    "Phase 8d":   { "name": "v3 레이어 일러스트",       "status": "done" },
    "Phase 8d-2": { "name": "LP 캐릭터 애니메이션",     "status": "done" },
    "Phase 8e":   { "name": "Typecast TTS 녹음",        "status": "pending" },
    "Phase 8e-2": { "name": "말풍선 + 텍스트 오버레이", "status": "in_progress" },
    "Phase 8f":   { "name": "build_video v3 통합",      "status": "in_progress" },
    "Phase 8g":   { "name": "BGM/SFX 소싱 + 믹싱",     "status": "pending" },
    "Phase 8h":   { "name": "영상 조립 + QA",           "status": "pending" },
    "Phase 8i":   { "name": "업로드 준비",              "status": "pending" }
  },
  "assets": {
    "locations": 8,
    "characters_style_a": 6,
    "characters_style_b": 18,
    "alphas": 34,
    "composites_portrait": 11,
    "composites_scene": 14,
    "lp_animations": 34,
    "bubbles": 5,
    "angel_devil": 4,
    "kongi_poses": 8
  },
  "milestones": [
    { "text": "v1 파이프라인 완료",          "done": true,  "date": "2026-04-12" },
    { "text": "시네마틱 각본 v2 확정",       "done": true,  "date": "2026-04-13" },
    { "text": "보이스 캐스팅 후보 선별",     "done": true,  "date": "2026-04-13" },
    { "text": "v3 레이어 시스템 설계",       "done": true,  "date": "2026-04-14" },
    { "text": "로케이션 8장 생성",           "done": true,  "date": "2026-04-14" },
    { "text": "듀얼 그림체 시스템 도입",     "done": true,  "date": "2026-04-14" },
    { "text": "캐릭터 24종 + 알파 추출",     "done": true,  "date": "2026-04-14" },
    { "text": "씬 합성 25장 완료",           "done": true,  "date": "2026-04-14" },
    { "text": "v2 프리뷰 빌드 완성",         "done": true,  "date": "2026-04-14" },
    { "text": "LP 애니메이션 34/36",         "done": true,  "date": "2026-04-15" },
    { "text": "말풍선/천사/악마 에셋 완료",  "done": true,  "date": "2026-04-15" },
    { "text": "콩이 포즈 8종 완료",          "done": true,  "date": "2026-04-15" },
    { "text": "build_video_v3 LP+말풍선 통합","done": true, "date": "2026-04-15" },
    { "text": "S-06 LP+말풍선 프리뷰 완성",  "done": true,  "date": "2026-04-15" },
    { "text": "S-06 QA 5개 이슈 수정 완료",  "done": true,  "date": "2026-04-15" },
    { "text": "Typecast TTS 녹음 완료",      "done": false, "date": null },
    { "text": "BGM/SFX 믹싱 완료",           "done": false, "date": null },
    { "text": "롱폼 영상 최종 완성",         "done": false, "date": null },
    { "text": "쇼츠 5편 완성",               "done": false, "date": null },
    { "text": "YouTube 업로드",              "done": false, "date": null }
  ]
};
// ─────────────────────────────────────────────────────────────────

const BASE = './worklog/';
let activeDate = null;

function render(d) {
  document.getElementById('episode-badge').textContent =
    `${d.project.current_episode} — ${d.project.episode_title}`;

  document.getElementById('last-updated').textContent =
    new Date(d.last_updated).toLocaleString('ko-KR');

  // Stats
  const stats = [
    { value: d.assets.locations, label: 'Locations' },
    { value: d.assets.characters_style_a, label: 'Chars (A)' },
    { value: d.assets.characters_style_b, label: 'Chars (B)' },
    { value: (d.assets.composites_portrait||0) + (d.assets.composites_scene||0), label: 'Composites' },
    { value: d.assets.lp_animations, label: 'LP Anim' },
    { value: (d.assets.bubbles||0) + (d.assets.angel_devil||0) + (d.assets.kongi_poses||0), label: 'FX Assets' },
  ];
  document.getElementById('stats-grid').innerHTML = stats.map(s =>
    `<div class="stat-card"><div class="value">${s.value ?? 0}</div><div class="label">${s.label}</div></div>`
  ).join('');

  // Phase progress
  const phases = Object.entries(d.phases);
  const done = phases.filter(([,v]) => v.status === 'done').length;
  const total = phases.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-text').textContent = `${done} / ${total} phases complete`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-bar').style.width = `${pct}%`;
  document.getElementById('phase-list').innerHTML = phases.map(([id, p]) => {
    const label = p.status === 'done' ? 'Done' : p.status === 'in_progress' ? 'In Progress' : 'Pending';
    return `<li class="phase-item">
      <span class="phase-dot ${p.status}"></span>
      <span class="phase-id">${id}</span>
      <span>${p.name}</span>
      <span class="phase-status ${p.status}">${label}</span>
    </li>`;
  }).join('');

  // Milestones
  document.getElementById('milestones').innerHTML = d.milestones.map(m =>
    `<div class="milestone-item ${m.done ? '' : 'pending'}">
      <span class="milestone-check">${m.done ? '✅' : '⬜'}</span>
      <span class="milestone-text">${esc(m.text)}</span>
      ${m.date ? `<span class="milestone-date">${m.date}</span>` : ''}
    </div>`
  ).join('');

  // Assets panel
  document.getElementById('assets-panel').innerHTML = [
    ['🏞️', 'Background Locations',         d.assets.locations],
    ['😊', 'Chars Style A (SD)',            d.assets.characters_style_a],
    ['🎬', 'Chars Style B (Cinematic)',     d.assets.characters_style_b],
    ['🖼️', 'Alpha Extractions',            d.assets.alphas],
    ['📐', 'Composites (Portrait)',         d.assets.composites_portrait],
    ['📐', 'Composites (Scene)',            d.assets.composites_scene],
    ['🎭', 'LivePortrait Animations',       d.assets.lp_animations],
    ['💬', 'Speech/Thought Bubbles',        d.assets.bubbles],
    ['😇', 'Angel/Devil Assets',           d.assets.angel_devil],
    ['🐾', 'Kongi Poses',                  d.assets.kongi_poses],
  ].map(([icon, label, val]) =>
    `<div class="milestone-item">
      <span class="milestone-check">${icon}</span>
      <span class="milestone-text">${label}</span>
      <span class="milestone-date" style="font-weight:600;color:var(--accent)">${val ?? 0}</span>
    </div>`
  ).join('');

  // Worklog nav
  document.getElementById('worklog-nav').innerHTML = d.dates.slice().reverse().map(date =>
    `<button class="worklog-btn" data-date="${date}" onclick="loadWorklog('${date}')">${date}</button>`
  ).join('');

  // Auto-load latest
  if (d.dates.length > 0) {
    loadWorklog(d.dates[d.dates.length - 1]);
  }
}

async function loadWorklog(date) {
  activeDate = date;
  document.querySelectorAll('.worklog-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === date);
  });
  const el = document.getElementById('worklog-content');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res = await fetch(BASE + date + '.md?' + Date.now());
    if (!res.ok) throw new Error('Not found');
    el.innerHTML = renderMarkdown(await res.text());
  } catch {
    el.innerHTML = `<div class="error-msg">작업일지 없음: ${date}</div>`;
  }
}

function renderMarkdown(md) {
  let html = '';
  const lines = md.split('\n');
  let inList = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('# ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h1>${esc(line.slice(2))}</h1>`;
    } else if (line.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h2>${esc(line.slice(3))}</h2>`;
    } else if (line.startsWith('### ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h3>${esc(line.slice(4))}</h3>`;
    } else if (line.startsWith('- ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inline(line.slice(2))}</li>`;
    } else if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p style="font-size:14px;margin:4px 0">${inline(line)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function inline(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return s;
}

// 즉시 렌더 (네트워크 없이)
render(EMBEDDED_DATA);
</script>
</body>
</html>
