<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEP Dashboard - 일상속 경험의 심리학</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-hover: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f3a5f;
    --green: #3fb950;
    --green-dim: #1a3a2a;
    --yellow: #d29922;
    --yellow-dim: #3d2e00;
    --red: #f85149;
    --purple: #bc8cff;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f8fa;
      --bg-card: #ffffff;
      --bg-hover: #f3f4f6;
      --border: #d0d7de;
      --text: #1f2328;
      --text-dim: #656d76;
      --accent: #0969da;
      --accent-dim: #ddf4ff;
      --green: #1a7f37;
      --green-dim: #dafbe1;
      --yellow: #9a6700;
      --yellow-dim: #fff8c5;
      --red: #cf222e;
      --purple: #8250df;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .header .subtitle { color: var(--text-dim); font-size: 15px; }
  .header .episode-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* Progress section */
  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .icon { font-size: 20px; }

  .progress-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .progress-overall {
    margin-bottom: 16px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 12px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s ease;
  }
  .progress-bar-fill.green { background: var(--green); }
  .progress-bar-fill.yellow { background: var(--yellow); }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-dim);
  }

  .phase-list { list-style: none; }
  .phase-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .phase-item:last-child { border-bottom: none; }
  .phase-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .phase-dot.done { background: var(--green); }
  .phase-dot.in_progress { background: var(--yellow); animation: pulse 2s infinite; }
  .phase-dot.pending { background: var(--border); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .phase-id { color: var(--text-dim); font-family: monospace; font-size: 12px; min-width: 90px; }
  .phase-status {
    margin-left: auto;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .phase-status.done { background: var(--green-dim); color: var(--green); }
  .phase-status.in_progress { background: var(--yellow-dim); color: var(--yellow); }
  .phase-status.pending { color: var(--text-dim); }

  /* Milestones */
  .milestones-grid {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .milestone-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 14px;
  }
  .milestone-check { font-size: 16px; flex-shrink: 0; }
  .milestone-date { margin-left: auto; font-size: 12px; color: var(--text-dim); font-family: monospace; }
  .milestone-item.pending .milestone-text { color: var(--text-dim); }

  /* Worklog timeline */
  .worklog-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .worklog-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-family: monospace;
    transition: all 0.2s;
  }
  .worklog-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
  .worklog-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .worklog-content {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    min-height: 200px;
  }
  .worklog-content h1 { font-size: 20px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .worklog-content h2 { font-size: 16px; color: var(--text-dim); margin: 16px 0 8px; }
  .worklog-content h3 { font-size: 14px; color: var(--accent); margin: 12px 0 6px; }
  .worklog-content ul { padding-left: 20px; margin-bottom: 8px; }
  .worklog-content li { font-size: 14px; margin-bottom: 4px; line-height: 1.5; }
  .worklog-content code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'SF Mono', Monaco, monospace;
  }

  .collapsible-header {
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .collapsible-header::before {
    content: '\25B6';
    font-size: 10px;
    transition: transform 0.2s;
    display: inline-block;
  }
  .collapsible-header.open::before { transform: rotate(90deg); }
  .collapsible-body { display: none; }
  .collapsible-body.open { display: block; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--text-dim); }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px 0;
    color: var(--text-dim);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 24px;
  }

  /* Two column layout */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 700px) {
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>FEP Dashboard</h1>
    <div class="subtitle">일상속 경험의 심리학 - 제작 진행 현황</div>
    <div class="episode-badge" id="episode-badge">Loading...</div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid"></div>

  <!-- Phase Progress -->
  <div class="section">
    <div class="section-title"><span class="icon">&#9881;</span> Phase 진행률</div>
    <div class="progress-container">
      <div class="progress-overall">
        <div class="progress-label">
          <span id="progress-text">Loading...</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill green" id="progress-bar" style="width: 0%"></div>
        </div>
      </div>
      <ul class="phase-list" id="phase-list"></ul>
    </div>
  </div>

  <!-- Two column: Milestones + Assets -->
  <div class="two-col">
    <div class="section">
      <div class="section-title"><span class="icon">&#9733;</span> Milestones</div>
      <div class="milestones-grid" id="milestones"></div>
    </div>
    <div class="section">
      <div class="section-title"><span class="icon">&#9881;</span> Asset Count</div>
      <div class="milestones-grid" id="assets-panel"></div>
    </div>
  </div>

  <!-- Worklog -->
  <div class="section">
    <div class="section-title"><span class="icon">&#128221;</span> Work Log</div>
    <div class="worklog-nav" id="worklog-nav"></div>
    <div class="worklog-content" id="worklog-content">
      <div class="loading">Select a date to view the work log.</div>
    </div>
  </div>

  <div class="footer">
    FEP (Familiar Experience Psychology) &middot; P21 &middot; Last updated: <span id="last-updated">-</span>
  </div>
</div>

<script>
const BASE = './worklog/';
let indexData = null;
let activeDate = null;

async function loadIndex() {
  try {
    const res = await fetch(BASE + 'index.json?' + Date.now());
    indexData = await res.json();
    render();
  } catch (e) {
    document.getElementById('worklog-content').innerHTML =
      '<div class="loading">Failed to load index.json. Make sure you are serving this via HTTP.</div>';
  }
}

function render() {
  const d = indexData;

  // Episode badge
  document.getElementById('episode-badge').textContent =
    `${d.project.current_episode} - ${d.project.episode_title}`;

  // Last updated
  document.getElementById('last-updated').textContent =
    new Date(d.last_updated).toLocaleString('ko-KR');

  // Stats
  const statsEl = document.getElementById('stats-grid');
  const stats = [
    { value: d.assets.locations, label: 'Locations' },
    { value: d.assets.characters_style_a, label: 'Chars (A)' },
    { value: d.assets.characters_style_b, label: 'Chars (B)' },
    { value: d.assets.composites, label: 'Composites' },
    { value: d.assets.scenes_v1, label: 'Scenes (v1)' },
    { value: d.assets.lp_animations, label: 'LP Anim' },
  ];
  statsEl.innerHTML = stats.map(s =>
    `<div class="stat-card"><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`
  ).join('');

  // Phases
  const phases = Object.entries(d.phases);
  const done = phases.filter(([,v]) => v.status === 'done').length;
  const total = phases.length;
  const pct = Math.round((done / total) * 100);

  document.getElementById('progress-text').textContent = `${done} / ${total} phases complete`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-bar').style.width = `${pct}%`;

  const phaseListEl = document.getElementById('phase-list');
  phaseListEl.innerHTML = phases.map(([id, p]) => {
    const statusLabel = p.status === 'done' ? 'Done' : p.status === 'in_progress' ? 'In Progress' : 'Pending';
    return `<li class="phase-item">
      <span class="phase-dot ${p.status}"></span>
      <span class="phase-id">${id}</span>
      <span>${p.name}</span>
      <span class="phase-status ${p.status}">${statusLabel}</span>
    </li>`;
  }).join('');

  // Milestones
  const msEl = document.getElementById('milestones');
  msEl.innerHTML = d.milestones.map(m =>
    `<div class="milestone-item ${m.done ? '' : 'pending'}">
      <span class="milestone-check">${m.done ? '\u2705' : '\u2B1C'}</span>
      <span class="milestone-text">${m.text}</span>
      ${m.date ? `<span class="milestone-date">${m.date}</span>` : ''}
    </div>`
  ).join('');

  // Assets panel
  const assetsEl = document.getElementById('assets-panel');
  const assetItems = [
    { label: 'Background Locations', value: d.assets.locations, icon: '\uD83C\uDFDE\uFE0F' },
    { label: 'Characters (Style A - SD)', value: d.assets.characters_style_a, icon: '\uD83D\uDE0A' },
    { label: 'Characters (Style B - Cinematic)', value: d.assets.characters_style_b, icon: '\uD83C\uDFAC' },
    { label: 'Composited Scenes', value: d.assets.composites, icon: '\uD83D\uDDBC\uFE0F' },
    { label: 'LivePortrait Animations', value: d.assets.lp_animations, icon: '\uD83C\uDFAC' },
    { label: 'Scenes (v1 legacy)', value: d.assets.scenes_v1, icon: '\uD83D\uDCC1' },
  ];
  assetsEl.innerHTML = assetItems.map(a =>
    `<div class="milestone-item">
      <span class="milestone-check">${a.icon}</span>
      <span class="milestone-text">${a.label}</span>
      <span class="milestone-date" style="font-weight:600;color:var(--accent)">${a.value}</span>
    </div>`
  ).join('');

  // Worklog navigation
  const navEl = document.getElementById('worklog-nav');
  navEl.innerHTML = d.dates.slice().reverse().map(date =>
    `<button class="worklog-btn" data-date="${date}" onclick="loadWorklog('${date}')">${date}</button>`
  ).join('');

  // Auto-load latest
  if (d.dates.length > 0) {
    loadWorklog(d.dates[d.dates.length - 1]);
  }
}

async function loadWorklog(date) {
  activeDate = date;

  // Update nav buttons
  document.querySelectorAll('.worklog-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === date);
  });

  const contentEl = document.getElementById('worklog-content');
  contentEl.innerHTML = '<div class="loading">Loading...</div>';

  try {
    const res = await fetch(BASE + date + '.md?' + Date.now());
    if (!res.ok) throw new Error('Not found');
    const md = await res.text();
    contentEl.innerHTML = renderMarkdown(md);
    attachCollapsibles();
  } catch (e) {
    contentEl.innerHTML = `<div class="loading">No worklog for ${date}</div>`;
  }
}

function renderMarkdown(md) {
  let html = '';
  const lines = md.split('\n');
  let inList = false;
  let sectionCount = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.startsWith('# ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h1>${esc(line.slice(2))}</h1>`;
    } else if (line.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      const id = 'sec-' + (sectionCount++);
      html += `<h2 class="collapsible-header open" data-target="${id}">${esc(line.slice(3))}</h2><div class="collapsible-body open" id="${id}">`;
      // Find end of section (next ## or end)
      let j = i + 1;
      while (j < lines.length && !lines[j].startsWith('## ')) j++;
      // Render section content
      for (let k = i + 1; k < j; k++) {
        const sl = lines[k];
        if (sl.startsWith('### ')) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<h3>${esc(sl.slice(4))}</h3>`;
        } else if (sl.startsWith('- ')) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += `<li>${escInline(sl.slice(2))}</li>`;
        } else if (sl.trim() === '') {
          if (inList) { html += '</ul>'; inList = false; }
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<p style="font-size:14px;margin:4px 0">${escInline(sl)}</p>`;
        }
      }
      if (inList) { html += '</ul>'; inList = false; }
      html += '</div>';
      i = j - 1;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escInline(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/->/, '\u2192');
  return s;
}

function attachCollapsibles() {
  document.querySelectorAll('.collapsible-header').forEach(h => {
    h.addEventListener('click', () => {
      const target = document.getElementById(h.dataset.target);
      if (target) {
        h.classList.toggle('open');
        target.classList.toggle('open');
      }
    });
  });
}

loadIndex();
</script>
</body>
</html>
